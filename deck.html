<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentation</title>
  <!-- Set the dark theme before first paint to avoid a flash. -->
  <script>
    try {
      const t = new URLSearchParams(location.search).get("theme") || localStorage.getItem("mdeck-theme");
      if (t === "dark") document.documentElement.classList.add("dark");
    } catch (e) {}
  </script>
</head>
<body>
  <!-- The engine injects styles, loads its dependencies and builds the
       viewer chrome. This single script is all a deck page needs. -->
  <script src="assets/mdeck.js"></script>
</body>
</html>
